<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>第四课与第五课英语点读学习页</title>
<style>
body{margin:0;background:#f6f7fb;color:#172033;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
main{max-width:980px;margin:auto;padding:24px 16px 60px}h1{font-size:28px}h2{margin-top:36px;border-bottom:2px solid #dfe5ef;padding-bottom:8px}
.tip,.controls,.sentence,.card{background:white;border-radius:14px}.tip{background:#fff4cc;padding:13px;line-height:1.6}
.controls{padding:13px;margin:16px 0;display:flex;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:5;box-shadow:0 2px 10px #0001}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.card{border:0;padding:16px;text-align:left;box-shadow:0 2px 10px #0001;cursor:pointer;display:flex;flex-direction:column;gap:4px}
.word{font-size:21px;font-weight:700}.ipa{font-family:"Times New Roman",serif;color:#59657a;font-size:17px}.cn{font-size:16px}
.sentence{padding:16px;margin:12px 0;box-shadow:0 2px 10px #0001}.en{font-size:20px;font-weight:600;line-height:1.6;cursor:pointer}.zh{color:#59657a;line-height:1.6}
button{cursor:pointer}.speak{border:0;border-radius:999px;padding:8px 12px;background:#e8f0ff;margin-bottom:8px}.nav a{display:inline-block;margin-right:8px;padding:8px 12px;background:#edf2ff;border-radius:999px;text-decoration:none;color:#24355b}
</style></head><body><main>
<h1>第四课与第五课英语点读学习页</h1>
<div class="tip">点击单词卡、英文句子或“🔊朗读”即可播放。第四课已放在第五课前面。</div>
<div class="nav"><a href="#l4">第四课</a><a href="#l5">第五课</a></div>
<div class="controls"><label>语速 <input id="rate" type="range" min=".5" max="1.2" value=".8" step=".1"><span id="rv">0.8×</span></label>
<label>口音 <select id="voices"><option>正在加载语音……</option></select></label><button class="speak" onclick="speechSynthesis.cancel()">停止</button></div>
<section id="l4"><h2>第四课</h2><h3>单词</h3><div id="l4w" class="grid"></div><h3>which 从句与文章</h3><div id="l4s"></div></section>
<section id="l5"><h2>第五课</h2><h3>单词与短语</h3><div id="l5w" class="grid"></div><h3>文章</h3><div id="l5s"></div></section>
</main><script>
const D={"l4w": [["junction", "/ˈdʒʌŋkʃən/", "交叉点；交汇处"], ["pedestrian", "/pəˈdestriən/", "行人的；行人"], ["forbid", "/fərˈbɪd/", "禁止；阻止"], ["bend", "/bend/", "弯道；弯曲"], ["disabled", "/dɪsˈeɪbəld/", "残疾的；行动不便的"], ["arrangement", "/əˈreɪndʒmənt/", "安排；计划"], ["widen", "/ˈwaɪdən/", "使……变宽"], ["pavement", "/ˈpeɪvmənt/", "人行道；便道"], ["incorporate", "/ɪnˈkɔːrpəreɪt/", "合并；结合"], ["intersection", "/ˌɪntərˈsekʃən/", "十字路口；交叉口"], ["load", "/loʊd/", "装货；装载"], ["unload", "/ˌʌnˈloʊd/", "卸货"], ["convert", "/kənˈvɜːrt/", "改建；改造；转换"], ["cycling", "/ˈsaɪklɪŋ/", "骑车；骑行"], ["district", "/ˈdɪstrɪkt/", "区；地区"], ["drive", "/draɪv/", "机动车道；驾驶"], ["footpath", "/ˈfʊtpæθ/", "步行道；小路"], ["improvement", "/ɪmˈpruːvmənt/", "提高；改进"], ["outskirts", "/ˈaʊtskɜːrts/", "郊区；市郊"], ["redevelopment", "/ˌriːdɪˈveləpmənt/", "再开发；重建"]], "l4s": [["He is a writer, which is respectable.", "他是一名作家，这是一件受人尊敬的事。"], ["My mom is a teacher, which is most glorious under the sun.", "我妈妈是一名教师，这是天底下最光荣的职业。"], ["This is the room which he lived in last year.", "这就是他去年住过的房间。"], ["The pictures which I had taken won the first prize.", "我拍的那些照片获得了一等奖。"], ["This is the book which I bought yesterday.", "这就是我昨天买的书。"], ["This is the drama which I watched yesterday.", "这就是我昨天看的电视剧。"], ["What's your favourite food?", "你最喜欢的食物是什么？"], ["My favourite food is hamburgers. They have crispy bread, tender meat and fresh vegetables inside.", "我最喜欢的食物是汉堡。里面有酥脆的面包、嫩肉和新鲜蔬菜。"], ["I do not eat them too frequently because they are a little high in calories.", "我不会太频繁地吃，因为它们的热量有点高。"], ["They taste juicy and are convenient to grab when I am busy.", "它们吃起来多汁，而且我忙的时候拿起来就能吃，很方便。"], ["I usually buy one for a quick lunch on workdays.", "工作日我通常买一个当作快捷午餐。"], ["My favourite food is beef noodles, which taste really savory and warm.", "我最喜欢的食物是牛肉面，味道鲜美，而且吃起来很暖和。"], ["I often have them for lunch because they are filling and easy to get.", "我经常午餐吃牛肉面，因为它很顶饱，也很容易买到。"], ["Besides, I am quite fond of the rich soup base of this dish.", "此外，我很喜欢这道菜浓郁的汤底。"]], "l5w": [["reorient", "/ˌriːˈɔːriənt/", "重新定位；重新调整方向"], ["residential area", "/ˌrezɪˈdenʃəl ˈeriə/", "居民区；住宅区"], ["shade", "/ʃeɪd/", "阴凉处；树荫"], ["shelter", "/ˈʃeltər/", "隐蔽处；庇护所"], ["suburb", "/ˈsʌbɜːrb/", "郊区"], ["urban", "/ˈɜːrbən/", "城市的；市区的"], ["vehicle", "/ˈviːəkl/", "车辆；交通工具"], ["germination", "/ˌdʒɜːrmɪˈneɪʃən/", "发芽"], ["eventually", "/ɪˈventʃuəli/", "最终；终于"], ["optional", "/ˈɑːpʃənəl/", "可选择的"], ["module", "/ˈmɑːdʒuːl/", "模块；单元"], ["dissertation", "/ˌdɪsərˈteɪʃən/", "学位论文"], ["equipment", "/ɪˈkwɪpmənt/", "设备；工具"], ["laboratory", "/ˈlæbrətɔːri/", "实验室"], ["ambitious", "/æmˈbɪʃəs/", "有抱负的；有野心的"], ["assignment", "/əˈsaɪnmənt/", "作业；任务"], ["plates", "/pleɪts/", "盘子（复数）"], ["a great number of", "/ə ɡreɪt ˈnʌmbər əv/", "大量的；许多的"], ["hardly", "/ˈhɑːrdli/", "几乎不；几乎没有"], ["spare time", "/sper taɪm/", "空闲时间"], ["prepare meals", "/prɪˈper miːlz/", "准备饭菜"], ["have a go at", "/hæv ə ɡoʊ æt/", "尝试做……"], ["dishes", "/ˈdɪʃɪz/", "碗碟；菜肴"], ["quite", "/kwaɪt/", "相当；很"], ["exactly", "/ɪɡˈzæktli/", "准确地；正是；完全地"], ["afterward", "/ˈæftərwərd/", "之后；后来"], ["own", "/oʊn/", "自己的"]], "l5s": [["Do you like cooking?", "你喜欢做饭吗？"], ["I dislike cooking because cleaning plates after cooking is quite troublesome.", "我不喜欢做饭，因为做完饭后洗盘子很麻烦。"], ["I often finish a great number of coding assignments, which means I hardly have spare time to prepare meals.", "我经常需要完成大量编程作业，这意味着我几乎没有空闲时间准备饭菜。"], ["However, I would like to have a go at cooking if I am free and another person helps me wash the dishes.", "不过，如果我有空，而且有人帮我洗碗，我愿意尝试做饭。"], ["Yes, I really enjoy cooking in my spare time.", "是的，我很喜欢在空闲时间做饭。"], ["It relaxes me after long hours of coding work, and I can make food exactly to my own taste.", "长时间编程后，做饭能让我放松，而且我可以做出完全符合自己口味的食物。"], ["What makes me happiest is seeing other people enjoy the meals I cook.", "最让我开心的是看到别人喜欢我做的饭菜。"], ["I don't even mind washing dishes afterward.", "我甚至不介意之后洗碗。"]]};let vs=[];const sel=document.getElementById('voices'),rate=document.getElementById('rate'),rv=document.getElementById('rv');
rate.oninput=()=>rv.textContent=rate.value+'×';
function load(){vs=speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().startsWith('en'));sel.innerHTML='';vs.forEach((v,i)=>{let o=document.createElement('option');o.value=i;o.textContent=v.name+' ('+v.lang+')';if(v.lang==='en-US')o.selected=true;sel.appendChild(o)});if(!vs.length)sel.innerHTML='<option>系统默认英语语音</option>'}
speechSynthesis.onvoiceschanged=load;load();
function speak(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=Number(rate.value);if(vs[Number(sel.value)])u.voice=vs[Number(sel.value)];speechSynthesis.speak(u)}
function words(id,a){document.getElementById(id).innerHTML=a.map(x=>`<button class="card" onclick='speak(${JSON.stringify(x[0])})'><span>🔊</span><span class="word">${x[0]}</span><span class="ipa">${x[1]}</span><span class="cn">${x[2]}</span></button>`).join('')}
function sents(id,a){document.getElementById(id).innerHTML=a.map(x=>`<div class="sentence"><button class="speak" onclick='speak(${JSON.stringify(x[0])})'>🔊 朗读</button><div class="en" onclick='speak(${JSON.stringify(x[0])})'>${x[0]}</div><div class="zh">${x[1]}</div></div>`).join('')}
words('l4w',D.l4w);sents('l4s',D.l4s);words('l5w',D.l5w);sents('l5s',D.l5s);
</script></body></html>
