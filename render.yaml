services:
  - type: web
    name: xiaohe-english-agent-hexin11
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: ALLOWED_ORIGINS
        value: https://hexin-11.github.io
